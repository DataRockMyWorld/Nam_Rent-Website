<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="NamRent Fleet Management — End-to-End Fleet Management Solutions for businesses across Namibia and Southern Africa." />
    <title>NamRent Fleet Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Netlify Forms detection (hidden, required for React SPA) -->
    <form name="fleet-enquiry" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="fleet-enquiry" />
      <input name="bot-field" />
      <input name="clientType" />
      <input name="vehicleStatus" />
      <input name="services" />
      <input name="duration" />
      <input name="comments" />
      <input name="otherEnquiry" />
      <input name="name" />
      <input name="company" />
      <input name="email" />
      <input name="phone" />
      <input name="location" />
    </form>
  </body>
</html>
